version: v2
clean: true
plugins:
  # Go message types
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  # Go Connect handlers/clients
  - remote: buf.build/connectrpc/go
    out: gen
    opt: paths=source_relative
  # TypeScript message types (protobuf-es v2)
  - remote: buf.build/bufbuild/es
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=none
  # TanStack Query bindings (connect-query v2)
  - remote: buf.build/connectrpc/query-es
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=none
