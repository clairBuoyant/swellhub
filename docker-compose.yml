---
# Local development infrastructure. Credentials come from a gitignored .env
# (materialize it from 1Password with `task db:env`; see env.tmpl). Nothing here
# is committed. Start with `task db:up`.
services:
  postgres:
    image: postgres:17-alpine
    container_name: swellhub-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:?set DB_USERNAME in .env (see env.tmpl)}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env (see env.tmpl)}
      POSTGRES_DB: ${DB_NAME:-swellhub}
    ports:
      - "5432:5432"
    volumes:
      - swellhub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  swellhub-pgdata:
