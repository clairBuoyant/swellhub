---
version: '3'

tasks:
  gen:
    desc: Generate Go + TS code from protobuf definitions
    cmds:
      - buf generate

  lint:
    desc: Lint protobuf definitions
    cmds:
      - buf lint

  format:
    desc: Format protobuf definitions in place
    cmds:
      - buf format -w

  breaking:
    desc: Check protobuf definitions for breaking changes against main
    cmds:
      - buf breaking --against '.git#branch=main'
